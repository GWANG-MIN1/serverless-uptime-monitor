<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="980" fill="#0d1117" rx="14"/>

  <!-- Single outer block -->
  <rect x="18" y="18" width="664" height="944" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- Title -->
  <text x="350" y="52" text-anchor="middle" font-size="17" font-weight="700" fill="#e6edf3">Serverless Uptime Monitor</text>
  <text x="350" y="72" text-anchor="middle" font-size="11" fill="#6b7280">AWS Lambda · EventBridge · SQS · DynamoDB · SNS · S3</text>

  <!-- Divider -->
  <line x1="48" y1="84" x2="652" y2="84" stroke="#21262d" stroke-width="1"/>

  <!-- ─── Section label: API FLOW ─── -->
  <text x="350" y="106" text-anchor="middle" font-size="10" font-weight="700" fill="#4b5563" letter-spacing="2">① API FLOW</text>

  <!-- API Gateway -->
  <rect x="225" y="116" width="250" height="58" rx="9" fill="#0f1f3d" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="350" y="137" text-anchor="middle" font-size="10" fill="#93c5fd">Amazon API Gateway</text>
  <text x="350" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#bfdbfe">HTTP API</text>
  <text x="350" y="169" text-anchor="middle" font-size="9" fill="#60a5fa">POST · GET · DELETE /endpoints</text>

  <line x1="350" y1="174" x2="350" y2="198" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Lambda register -->
  <rect x="245" y="200" width="210" height="54" rx="9" fill="#0f2d1a" stroke="#22c55e" stroke-width="1.8"/>
  <text x="350" y="220" text-anchor="middle" font-size="10" fill="#86efac">AWS Lambda</text>
  <text x="350" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#bbf7d0">register</text>
  <text x="350" y="252" text-anchor="middle" font-size="9" fill="#4ade80">Python 3.12</text>

  <line x1="350" y1="254" x2="350" y2="278" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- DynamoDB -->
  <rect x="230" y="280" width="240" height="54" rx="9" fill="#1e1040" stroke="#8b5cf6" stroke-width="1.8"/>
  <text x="350" y="300" text-anchor="middle" font-size="10" fill="#c4b5fd">Amazon DynamoDB</text>
  <text x="350" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#ddd6fe">endpoints / check-history</text>
  <text x="350" y="332" text-anchor="middle" font-size="9" fill="#a78bfa">PAY_PER_REQUEST · TTL 30d</text>

  <!-- Section divider -->
  <line x1="48" y1="354" x2="652" y2="354" stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ─── Section label: HEALTH CHECK FLOW ─── -->
  <text x="350" y="374" text-anchor="middle" font-size="10" font-weight="700" fill="#4b5563" letter-spacing="2">② HEALTH CHECK FLOW</text>

  <!-- EventBridge -->
  <rect x="245" y="384" width="210" height="54" rx="9" fill="#0f1f3d" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="350" y="404" text-anchor="middle" font-size="10" fill="#93c5fd">Amazon EventBridge</text>
  <text x="350" y="422" text-anchor="middle" font-size="13" font-weight="700" fill="#bfdbfe">rate(1 minute)</text>
  <text x="350" y="436" text-anchor="middle" font-size="9" fill="#60a5fa">Scheduler</text>

  <line x1="350" y1="438" x2="350" y2="462" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Lambda health_check -->
  <rect x="245" y="464" width="210" height="54" rx="9" fill="#0f2d1a" stroke="#22c55e" stroke-width="1.8"/>
  <text x="350" y="484" text-anchor="middle" font-size="10" fill="#86efac">AWS Lambda</text>
  <text x="350" y="502" text-anchor="middle" font-size="13" font-weight="700" fill="#bbf7d0">health_check</text>
  <text x="350" y="516" text-anchor="middle" font-size="9" fill="#4ade80">HTTP GET · timeout 10s</text>

  <!-- red dashed arrow with label -->
  <line x1="350" y1="518" x2="350" y2="542" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <rect x="362" y="524" width="72" height="15" rx="4" fill="#1a0505"/>
  <text x="398" y="535" font-size="9" font-weight="700" fill="#ef4444">장애 감지 시</text>

  <!-- SQS -->
  <rect x="245" y="544" width="210" height="54" rx="9" fill="#2d0f0f" stroke="#ef4444" stroke-width="1.8"/>
  <text x="350" y="564" text-anchor="middle" font-size="10" fill="#fca5a5">Amazon SQS</text>
  <text x="350" y="582" text-anchor="middle" font-size="13" font-weight="700" fill="#fecaca">alert-queue</text>
  <text x="350" y="596" text-anchor="middle" font-size="9" fill="#f87171">+ Dead Letter Queue</text>

  <line x1="350" y1="598" x2="350" y2="622" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Lambda alert -->
  <rect x="245" y="624" width="210" height="54" rx="9" fill="#0f2d1a" stroke="#22c55e" stroke-width="1.8"/>
  <text x="350" y="644" text-anchor="middle" font-size="10" fill="#86efac">AWS Lambda</text>
  <text x="350" y="662" text-anchor="middle" font-size="13" font-weight="700" fill="#bbf7d0">alert</text>
  <text x="350" y="676" text-anchor="middle" font-size="9" fill="#4ade80">Python 3.12</text>

  <!-- split to Slack + SNS -->
  <line x1="350" y1="678" x2="350" y2="694" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="190" y1="694" x2="510" y2="694" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="190" y1="694" x2="190" y2="714" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="510" y1="694" x2="510" y2="714" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Slack -->
  <rect x="96" y="716" width="188" height="52" rx="9" fill="#0d1f38" stroke="#60a5fa" stroke-width="1.8"/>
  <text x="190" y="738" text-anchor="middle" font-size="10" fill="#93c5fd">Slack</text>
  <text x="190" y="756" text-anchor="middle" font-size="13" font-weight="700" fill="#bfdbfe">Webhook Alert</text>

  <!-- SNS Email -->
  <rect x="416" y="716" width="188" height="52" rx="9" fill="#2d1a0f" stroke="#f97316" stroke-width="1.8"/>
  <text x="510" y="738" text-anchor="middle" font-size="10" fill="#fdba74">Amazon SNS</text>
  <text x="510" y="756" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">Email Alert</text>

  <!-- Section divider -->
  <line x1="48" y1="786" x2="652" y2="786" stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ─── Section label: REPORT FLOW ─── -->
  <text x="350" y="806" text-anchor="middle" font-size="10" font-weight="700" fill="#4b5563" letter-spacing="2">③ REPORT FLOW</text>

  <!-- EventBridge monthly -->
  <rect x="245" y="816" width="210" height="54" rx="9" fill="#0f1f3d" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="350" y="836" text-anchor="middle" font-size="10" fill="#93c5fd">Amazon EventBridge</text>
  <text x="350" y="854" text-anchor="middle" font-size="13" font-weight="700" fill="#bfdbfe">cron (매월 1일)</text>
  <text x="350" y="868" text-anchor="middle" font-size="9" fill="#60a5fa">Scheduler</text>

  <line x1="350" y1="870" x2="350" y2="894" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Lambda report -->
  <rect x="245" y="896" width="210" height="54" rx="9" fill="#0f2d1a" stroke="#22c55e" stroke-width="1.8"/>
  <text x="350" y="916" text-anchor="middle" font-size="10" fill="#86efac">AWS Lambda</text>
  <text x="350" y="934" text-anchor="middle" font-size="13" font-weight="700" fill="#bbf7d0">report</text>
  <text x="350" y="948" text-anchor="middle" font-size="9" fill="#4ade80">업타임% · 평균응답시간 · 장애횟수</text>

  <line x1="350" y1="950" x2="350" y2="950" stroke="#6b7280" stroke-width="1.5"/>
  <!-- horizontal arrow to S3 -->
  <line x1="455" y1="923" x2="508" y2="923" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- S3 -->
  <rect x="510" y="898" width="144" height="62" rx="9" fill="#0f2030" stroke="#06b6d4" stroke-width="1.8"/>
  <text x="582" y="916" text-anchor="middle" font-size="10" fill="#67e8f9">Amazon S3</text>
  <text x="582" y="933" text-anchor="middle" font-size="12" font-weight="700" fill="#a5f3fc">월별 리포트</text>
  <text x="582" y="949" text-anchor="middle" font-size="9" fill="#67e8f9">JSON · 보존 90일</text>
</svg>
